services:
  - type: web
    name: auction-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 8080
      # Database - SmarterASP SQL Server
      - key: DB_SERVER
        sync: false   # Điền thủ công trong Render dashboard
      - key: DB_NAME
        sync: false
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: DB_ENCRYPT
        value: "true"
      - key: DB_TRUST_CERT
        value: "false"
      # JWT
      - key: JWT_SECRET
        sync: false
      # CORS - domain frontend của bạn
      - key: ALLOWED_ORIGINS
        sync: false
